<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震监测系统 - 四宫格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            overflow: hidden;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            transition: 0.3s ease;
        }
        .panel:hover {
            border-color: rgba(156, 163, 175, 0.4);
            z-index: 10;
        }
        .panel-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 5px 10px;
            border-radius: 6px 6px 0 0;
            border-bottom: 1px solid rgba(75, 85, 99, 0.5);
            flex-shrink: 0;
        }
        .panel-content {
            flex: 1;
        }
        @keyframes blink {
            0%, 100% { background-color: #22c55e; }
            50% { background-color: #4ade80; }
        }
        .status-blink {
            animation: blink 2s infinite;
        }
        .nav-bar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-gray-100 flex flex-col h-screen">
    <!-- 顶部导航 -->
    <header class="nav-bar px-5 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 status-blink"></div>
            <h1 class="text-white text-sm font-semibold">🌍 地震监测系统</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-gray-300 flex items-center gap-1 bg-white/5 border border-white/10 rounded-full px-2 py-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
                <span class="text-[10px]">Live</span>
            </div>
            <span class="text-gray-400 font-mono text-xs" id="time">--:--:--</span>
        </div>
    </header>

    <!-- 2×2 四宫格 -->
    <div class="p-2 flex-1">
        <div class="grid grid-cols-2 gap-2 h-full">
            <!-- 中国地震监测 cnquake -->
            <div class="panel bg-slate-900/60 border border-slate-800/60 rounded-lg">
                <div class="panel-header flex items-center gap-2">
                    <span>🇨🇳</span>
                    <span class="text-[10px] font-bold">中国地震监测</span>
                    <a href="https://qfwys.cn/cnquake/index.html" target="_blank" class="ml-auto text-blue-400 text-[9px]">↗</a>
                </div>
                <div class="panel-content">
                    <iframe src="https://qfwys.cn/cnquake/index.html"></iframe>
                </div>
            </div>

            <!-- Kanameishi -->
            <div class="panel bg-slate-900/60 border border-slate-800/60 rounded-lg">
                <div class="panel-header flex items-center gap-2">
                    <span>🗺️</span>
                    <span class="text-[10px] font-bold">Kanameishi</span>
                    <a href="https://kanameishi.lipomoea.tech/" target="_blank" class="ml-auto text-blue-400 text-[9px]">↗</a>
                </div>
                <div class="panel-content">
                    <iframe src="https://kanameishi.lipomoea.tech/"></iframe>
                </div>
            </div>

            <!-- kotoho7 -->
            <div class="panel bg-slate-900/60 border border-slate-800/60 rounded-lg">
                <div class="panel-header flex items-center gap-2">
                    <span>📊</span>
                    <span class="text-[10px] font-bold">kotoho7</span>
                    <a href="https://kotoho7.github.io/scratch-realtime-earthquake-viewer-page/" target="_blank" class="ml-auto text-blue-400 text-[9px]">↗</a>
                </div>
                <div class="panel-content">
                    <iframe src="https://kotoho7.github.io/scratch-realtime-earthquake-viewer-page/"></iframe>
                </div>
            </div>

            <!-- B站直播 -->
            <div class="panel bg-slate-900/60 border border-slate-800/60 rounded-lg">
                <div class="panel-header flex items-center gap-2">
                    <span>📺</span>
                    <span class="text-[10px] font-bold">B站直播</span>
                </div>
                <div class="panel-content">
                    <iframe src="https://www.bilibili.com/blackboard/live/live-activity-player.html?cid=22863790&quality=0" allow="fullscreen"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTime(){
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('zh-CN',{hour12:false});
        }
        setInterval(updateTime,1000);
        updateTime();
    </script>
</body>
</html>
